services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: snapfix_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - media_files:/app/media
      - log_files:/app/logs
    env_file: .env
    depends_on:
      - db

volumes:
  postgres_data:
  media_files:
  log_files:
