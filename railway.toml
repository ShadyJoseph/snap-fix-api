[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
releaseCommand = "python manage.py migrate --noinput && python manage.py create_superuser"

# This is the most reliable way on Railway
startCommand = "bash -c 'echo \"=== PORT is ${PORT} ===\"; gunicorn config.wsgi:application --bind 0.0.0.0:${PORT:-8080} --workers 2 --timeout 120 --access-logfile - --error-logfile - --log-level debug'"

healthcheckPath = "/"
healthcheckTimeout = 60

# Restart policy
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3