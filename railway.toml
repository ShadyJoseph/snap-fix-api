[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
releaseCommand = "python manage.py migrate --noinput && python manage.py create_superuser"

startCommand = "bash -c 'echo \"=== RAILWAY PORT = ${PORT} ===\"; rm -f gunicorn.conf.py 2>/dev/null || true; echo \"=== gunicorn.conf.py removed if existed ===\"; ls -la | grep -E \"gunicorn|conf\" || echo \"No gunicorn config found\"; exec gunicorn config.wsgi:application --bind 0.0.0.0:${PORT:-8080} --workers 2 --timeout 120 --access-logfile - --error-logfile - --log-level debug --no-config'"

healthcheckPath = "/"
healthcheckTimeout = 60

restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3