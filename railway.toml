[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# Safe migrations + superuser creation
releaseCommand = "python manage.py migrate --noinput && python manage.py create_superuser"

# Start app, expand $PORT properly
startCommand = "sh -c \"gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --access-logfile - --error-logfile - --log-level debug\""

# Health check
healthcheckPath = "/"
healthcheckTimeout = 60

# Restart policy
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3